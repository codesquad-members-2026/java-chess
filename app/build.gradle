plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // JUnit 4 사용
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.assertj:assertj-core:3.25.3'
}

test {
    
    // useJUnitPlatform()
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Test) {
    systemProperty "file.encoding", "UTF-8"
}

// build.gradle 하단에 추가
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// 'run' 태스크를 직접 정의하여 실행 오류를 우회합니다.
tasks.register('runGame', JavaExec) {
    group = 'application'
    description = '체스 게임 실행'
    mainClass = 'com.codesquad.chess.main' // 메인 클래스 경로 확인!
    classpath = sourceSets.main.runtimeClasspath
    standardInput = System.in // 이 줄이 있어야 콘솔에서 'start' 입력을 받을 수 있습니다.
}